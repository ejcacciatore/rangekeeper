name: Export Dashboard Data

on:
  schedule:
    - cron: '0 3 * * *'  # Every day at 3 AM UTC
  workflow_dispatch:      # Manual trigger via GitHub UI

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm install
      
      - name: Fetch latest data from backend
        run: |
          # Start backend in background
          cd backend
          timeout 10 npm start > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          
          # Give it time to start
          sleep 3
          
          # Try to export data (with retry)
          for i in {1..3}; do
            if curl -s http://localhost:3000/api/export/json -o ../data/latest.json; then
              echo "✅ Data exported successfully"
              break
            else
              echo "⏳ Retry $i/3..."
              sleep 2
            fi
          done
          
          # Kill background process
          kill $BACKEND_PID 2>/dev/null || true
          sleep 1
      
      - name: Verify data was exported
        run: |
          if [ -f "data/latest.json" ] && [ -s "data/latest.json" ]; then
            echo "✅ latest.json exists and has content"
            du -h data/latest.json
          else
            echo "⚠️  latest.json is empty or missing, skipping commit"
            exit 1
          fi
      
      - name: Commit and push changes
        run: |
          git config user.name "RangeKeeper Bot"
          git config user.email "bot@rangekeeper.app"
          
          # Only commit if data.json changed
          if git diff --exit-code data/latest.json > /dev/null 2>&1; then
            echo "ℹ️  No changes to commit"
          else
            git add data/latest.json
            git commit -m "Auto-export: updated dashboard data [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]"
            git push
            echo "✅ Pushed to GitHub"
          fi
