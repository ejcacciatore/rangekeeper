version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rangekeeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rangekeeper
      POSTGRES_PASSWORD: rangekeeper_dev
      POSTGRES_DB: rangekeeper
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rangekeeper -d rangekeeper']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rangekeeper-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
